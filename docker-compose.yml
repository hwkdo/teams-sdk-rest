services:
  teams-sdk-rest:
    build: .
    ports:
      - "${PORT:-3978}:3978"
    env_file:
      - .env
    volumes:
      - teams-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3978/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  teams-data:
